<div class="fixed top-20 right-4 z-50 space-y-3 max-w-sm w-full">
  @for (toast of toasts; track toast.id) {
    <div [class]="getToastClasses(toast)">
      <svg class="w-5 h-5 mr-3 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" [attr.d]="getIconPath(toast.type)" />
      </svg>
      <span class="flex-1 text-sm font-medium">{{ toast.message }}</span>
      <button (click)="removeToast(toast.id)" 
              class="ml-3 p-1 rounded-lg hover:bg-black/5 dark:hover:bg-white/10 transition-colors">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>
  }
</div>
